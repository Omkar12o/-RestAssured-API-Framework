name: API Test Suite CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Inject GoRest token
        run: |
          sed -i "s|PASTE_YOUR_GOREST_ACCESS_TOKEN_HERE|${{ secrets.GOREST_ACCESS_TOKEN }}|" src/test/resources/config.properties

      - name: Run tests with Maven
        run: mvn clean test

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
